server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: usuarios-auth
          uri: http://usuarios-service:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: usuariosCircuitBreaker
                fallbackUri: forward:/fallback/usuarios

        - id: usuarios-perfil
          uri: http://usuarios-service:8081
          predicates:
            - Path=/api/v1/usuarios/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: usuariosCircuitBreaker
                fallbackUri: forward:/fallback/usuarios

        - id: usuarios-admin
          uri: http://usuarios-service:8081
          predicates:
            - Path=/api/v1/admin/usuarios/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: usuariosCircuitBreaker
                fallbackUri: forward:/fallback/usuarios

        - id: usuarios-swagger
          uri: http://usuarios-service:8081
          predicates:
            - Path=/swagger/usuarios/**
          filters:
            - RewritePath=/swagger/usuarios(?<segment>.*), ${segment}

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
            allowedHeaders: "*"

      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

resilience4j:
  circuitbreaker:
    instances:
      usuariosCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

management:
  endpoint:
    gateway:
      enabled: true
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,gateway
